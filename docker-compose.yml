services:
  x-market-watch:
    build: .
    environment:
      X_MARKET_WATCH_ENV_PATH: data/.env
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8787
      WEB_AUTO_POLL: "true"
    volumes:
      - ./data:/app/data
    ports:
      - "8787:8787"
    command: ["x-market-watch", "web"]
    restart: unless-stopped
